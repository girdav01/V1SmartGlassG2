# Copy to config.yaml (gitignored) or export matching V1SG_* env vars.

vision_one:
  # Your Trend Vision One API key (Bearer token). Generate under
  # Administration > API Keys in the Vision One console. Scope it to at least:
  #   - Workbench   (read)
  #   - ASRM        (read)
  api_key: "REPLACE_ME"

  # Regional hosting of your Vision One tenant. Pick one:
  #   us   -> api.xdr.trendmicro.com
  #   eu   -> api.eu.xdr.trendmicro.com
  #   jp   -> api.xdr.trendmicro.co.jp
  #   sg   -> api.sg.xdr.trendmicro.com
  #   au   -> api.au.xdr.trendmicro.com
  #   in   -> api.in.xdr.trendmicro.com
  #   uae  -> api.uae.xdr.trendmicro.com
  region: "eu"

  # Pull window (minutes) for workbench alerts on each refresh.
  lookback_minutes: 60

  # Minimum severity shown on the HUD: low | medium | high | critical
  min_severity: "medium"

glasses:
  # BLE names advertised by each G2 temple. Defaults work for stock G2s;
  # override if your pair advertises differently.
  left_name: "Even G2_L"
  right_name: "Even G2_R"

  # Per-frame HUD parameters. The G2 display is ~488x136 mono.
  max_lines: 5
  line_chars: 32

app:
  # Refresh cadence in seconds between API polls and HUD redraws.
  refresh_seconds: 60

  # How many top risky users/devices to include per frame.
  top_n: 3

  # dry_run=true skips BLE and prints frames to stdout.
  dry_run: false

llm:
  # Enable to answer free-form 'Hey Even, ask <question>' utterances by
  # routing them through an LLM with the MCP servers below as tools.
  # Requires `pip install v1smartglass[llm]`.
  enabled: false

  # OpenAI-compatible Chat Completions endpoint. Examples:
  #   Ollama via Tailscale:   http://100.x.y.z:11434/v1
  #   LMStudio (host):        http://host.docker.internal:1234/v1
  #   OpenAI:                 https://api.openai.com/v1
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"        # any non-empty string for local servers
  model: "qwen2.5:14b-instruct"

  max_chars: 160           # 5 HUD lines * 32 chars
  max_turns: 6             # cap LLM/tool iterations per question
  timeout_seconds: 30.0

mcp_servers:
  # Each server is started once at app launch and registered as a tool set
  # on the agent. Use `${VAR}` to pull secrets from process env vars.
  # Remove any block you don't need; all are optional.

  - name: vision_one
    transport: stdio
    command: docker
    args:
      - "run"
      - "-i"
      - "--rm"
      - "-e"
      - "TREND_VISION_ONE_API_KEY"
      - "ghcr.io/trendmicro/vision-one-mcp-server"
      - "-region"
      - "eu"
    env:
      TREND_VISION_ONE_API_KEY: "${V1SG_API_KEY}"

  - name: splunk
    transport: stdio
    command: uvx
    args: ["--from", "git+https://github.com/deslicer/mcp-for-splunk", "mcp-for-splunk"]
    env:
      SPLUNK_HOST: "${SPLUNK_HOST}"
      SPLUNK_PORT: "8089"
      SPLUNK_USERNAME: "${SPLUNK_USERNAME}"
      SPLUNK_PASSWORD: "${SPLUNK_PASSWORD}"
    enabled: false

  - name: misp
    transport: stdio
    command: uvx
    args: ["--from", "git+https://github.com/MISP/misp-mcp", "misp-mcp"]
    env:
      MISP_URL: "${MISP_URL}"
      MISP_API_KEY: "${MISP_API_KEY}"
    enabled: false

  - name: shodan
    transport: stdio
    command: uvx
    args: ["--from", "git+https://github.com/BurtTheCoder/mcp-shodan", "mcp-shodan"]
    env:
      SHODAN_API_KEY: "${SHODAN_API_KEY}"
    enabled: false

  - name: abuseipdb
    transport: stdio
    command: uvx
    args: ["--from", "git+https://github.com/n3r0-b1n4ry/mcp-abuseipdb", "mcp-abuseipdb"]
    env:
      ABUSEIPDB_API_KEY: "${ABUSEIPDB_API_KEY}"
    enabled: false

asr:
  # Host-mic transcription. The G2 fires the 'Hey Even' wake event over BLE,
  # then the host records a few seconds from its own mic (sounddevice) and
  # transcribes via faster-whisper. Requires `pip install v1smartglass[asr]`.
  # If false (or the extra isn't installed) we fall back to a wake-cycle UX
  # where each wake rotates between ALERTS and TOP_RISK.
  enabled: true

  # tiny.en (~75MB) is enough for short commands. base.en is more robust.
  model: "tiny.en"
  device: "cpu"          # cpu | cuda | auto
  compute_type: "int8"   # int8 (fast/small), int8_float16, float16, float32
  language: "en"

  # How long to record from the host mic on each wake event.
  record_seconds: 4.0
  sample_rate: 16000

  # sounddevice input device index/name; null = system default microphone.
  mic_device: null
